<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Rotina - Hábitos </title>

    <!--LINKS-->
    <script src="script.js" defer></script>

    <link rel="stylesheet" href="./output.css">
</head>
<body class="text-black dark:text-white bg-white dark:bg-[#0B1120]">
    
    <header class="relative px-8 h-17.5 flex items-center justify-evenly max-xl:justify-between">
        <div class="flex items-center gap-2">
            <p class="p-1.5 border-5 border-[#2DD4BF] rounded-md"></p>
            <h3 class="text-xl font-bold">Rotina</h3>
        </div>

        <!--PARTE PARA PC-->
        <div class="max-lg:hidden">
            <ul class="[&>li]:duration-200 text-(--Corverde) flex font-medium [&>li]:px-3 [&>li]:hover:text-white">
                <li> <a href="">Recursos</a> </li>
                <li> <a href="">Demo</a> </li>
                <li> <a href="">Números</a> </li>
                <li> <a href="">Planos</a> </li>
                <li> <a href="">FAQ</a> </li>
            </ul>
        </div>

        <div class="max-lg:hidden flex items-center gap-4">

            <button class="duration-200 font-medium px-5 py-1.5 shadow-[0_0_2px_white] rounded-xl hover:shadow-[0_0_2px_#0D9488] hover:text-(--Corverde)">Entrar</button>

            <button class="duration-200 px-5 py-1.5 shadow-[0_0_3px_rgba(255,255,255)]  font-medium bg-(--Corverde) hover:-translate-y-0.5 text-black hover:bg-[#10ada0 rounded-xl">Começar Grátis</button>
        </div>

        <!--PARTE PARA MOBILE-->

        <div class="lg:hidden flex gap-10">
            <img src="img/menuWhite.png" id="menu" class="duration-200">

            <div id="options" class="duration-200 flex opacity-0 pointer-events-none w-full absolute flex-col pb-6 px-8 gap-5 right-0 top-full shadow-[0_1px_0.5px_#ffffff36] [&>a]:shadow-[0_1px_0.5px_#ffffff36] [&>a]:py-2">
                <a href="">Como Funciona</a>

                <a href="">Recursos</a>

                <a href="">Experimentar</a>

                <a href="">Preços</a>

                <a href="">FAQ</a>

                <button class="duration-200 px-5 py-2 shadow-[0_3px_10px_#ffffff36]  font-medium bg-(--Corverde) hover:-translate-y-0.5 text-black hover:bg-[#10ada0] rounded-xl">Começar Grátis</button>
            </div>
        </div>

    </header>

</body>
</html>
